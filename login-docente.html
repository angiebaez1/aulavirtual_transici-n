<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso Docente</title>
<link rel="icon" href="img/favicon.png" type="image/png">
<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.login-card{
background:white;
padding:40px;
border-radius:18px;
width:100%;
max-width:420px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
text-align:center;
}

.logo-login img{
width:120px;
height:auto;
margin-bottom:10px;
}


input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}

.btn-login{
width:100%;
padding:12px;
background:#2a5298;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-login:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="login-card">
<div class="logo-login">
  <img src="img/logo.png" alt="Logo institucional">
</div>

<h2>Acceso Docente</h2>

<p>Colegio Pedagógico María Montessori</p>

<form onsubmit="return loginDocente(event)">

<input type="text"
id="usuarioDocente"
placeholder="Usuario docente"
required>

<input type="password"
id="passwordDocente"
placeholder="Contraseña"
required>

<button type="submit" class="btn-login">
Ingresar
</button>

</form>

</div>

<script>

function loginDocente(event){

event.preventDefault();

const usuario =
document.getElementById("usuarioDocente").value;

const password =
document.getElementById("passwordDocente").value;

if(usuario==="docente" && password==="1234"){

window.location.href="panel-docente.html";

}else{

alert("Credenciales incorrectas");

}

return false;

}

</script>

</body>
</html>
